version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sdirs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: disaster_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sdirs-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sdirs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sdirs-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sdirs-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/disaster_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SOCKET_CORS_ORIGIN=${SOCKET_CORS_ORIGIN}
      - LOG_LEVEL=INFO
    depends_on:
      - postgres
      - redis
    command: >
      sh -c "python init_db_production.py && 
             uvicorn main:sio_app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend/static:/app/static
    networks:
      - sdirs-network

  # Frontend Command Center
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sdirs-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sdirs-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sdirs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sdirs-network

volumes:
  postgres_data:
  redis_data:

networks:
  sdirs-network:
    driver: bridge
